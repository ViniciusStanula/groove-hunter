name: Last.fm Artist Crawler

on:
  schedule:
    - cron: '0 1 * * 0'  # Every Sunday at 1am UTC — starts a fresh crawl cycle
  workflow_dispatch:
  repository_dispatch:
    types: [crawl-next-batch]

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      actions: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run crawler batch
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
        run: npx tsx scripts/crawl-lastfm.ts

      - name: Trigger next batch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/ViniciusStanula/groove-hunter/actions/workflows/crawl-lastfm.yml/dispatches \
            -d '{"ref":"main"}'
          echo "Next batch triggered."
