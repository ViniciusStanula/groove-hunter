name: Scrape Music Scores

on:
  workflow_dispatch:
    inputs:
      rank_start:
        description: 'Rank start (first artist rank to scrape)'
        default: '1'
      rank_end:
        description: 'Rank end (last artist rank to scrape)'
        default: '100'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6h max

    permissions:
      actions: write
      contents: read

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
      DISCOGS_KEY: ${{ secrets.DISCOGS_KEY }}
      DISCOGS_SECRET: ${{ secrets.DISCOGS_SECRET }}
      SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
      SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
      RANK_START: ${{ inputs.rank_start }}
      RANK_END: ${{ inputs.rank_end }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Scrape albums and scores
        run: npx tsx --tsconfig tsconfig.json scripts/scrape-albums.ts

      - name: Trigger next Last.fm crawler batch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/ViniciusStanula/groove-hunter/actions/workflows/crawl-lastfm.yml/dispatches \
            -d '{"ref":"main"}'
          echo "Triggered next Last.fm crawler batch."
