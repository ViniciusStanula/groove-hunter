name: Scrape Music Scores

on:
  schedule:
    - cron: '0 4 * * 0'  # Every Sunday at 4am UTC — runs after Last.fm crawler finishes
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6h — scraping 30 artists takes time

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
      DISCOGS_KEY: ${{ secrets.DISCOGS_KEY }}
      DISCOGS_SECRET: ${{ secrets.DISCOGS_SECRET }}
      SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
      SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
      TOP_N: '30'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Scrape albums and scores
        run: npx tsx --tsconfig tsconfig.json scripts/scrape-albums.ts
