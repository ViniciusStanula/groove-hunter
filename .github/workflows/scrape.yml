name: Scrape Music Scores

on:
  schedule:
    - cron: '0 3 * * 0'  # Every Sunday at 3am UTC
  workflow_dispatch:      # Manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
      REFRESH_SECRET: ${{ secrets.REFRESH_SECRET }}
      DISCOGS_KEY: ${{ secrets.DISCOGS_KEY }}
      DISCOGS_SECRET: ${{ secrets.DISCOGS_SECRET }}
      SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
      SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
      # Add when Supabase is set up:
      # SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      # SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Trigger refresh
        run: |
          curl -X POST "${{ secrets.SITE_URL }}/api/refresh" \
            -H "Content-Type: application/json" \
            -d '{"secret":"${{ secrets.REFRESH_SECRET }}"}'
        # SITE_URL = your deployed site URL e.g. https://scorestack.example.com
        # Once on Supabase: the refresh endpoint will write to cloud DB directly
